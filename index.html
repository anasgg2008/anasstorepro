<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon OSINT Tree</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { 
            background-color: #0a0a0a; 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; 
            color: white; 
        }
        
        /* تأثير النييون الأحمر */
        .node circle { 
            stroke: #ff0000; 
            stroke-width: 2px; 
            box-shadow: 0 0 15px #ff0000;
            filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.8));
            cursor: pointer;
        }
        
        .link { 
            fill: none; 
            stroke: rgba(255, 0, 0, 0.2); 
            stroke-width: 1.5px; 
        }

        .node text { 
            fill: #ff9999; 
            font-size: 13px; 
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
            pointer-events: none;
        }

        /* أزرار التحكم السفلى */
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(20, 0, 0, 0.85);
            padding: 12px 25px; border-radius: 50px; border: 1px solid #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6); z-index: 100;
        }

        button {
            background: #ff0000; border: none; color: white; width: 45px; height: 45px;
            border-radius: 50%; font-size: 22px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        button:hover { background: #ff4d4d; transform: scale(1.1); }
        .selected circle { stroke: #ffffff !important; stroke-width: 3px; filter: drop-shadow(0 0 12px #fff); }
    </style>
</head>
<body class="edit-mode">

<div class="controls">
    <button id="add-btn">+</button>
    <button id="save-btn">✅</button>
</div>

<script>
    let treeData = null;
    let selectedNode = null;
    let isEditMode = true;

    // 1. إعداد البيانات الأولية
    const rootName = prompt("أدخل اسم المستودع الرئيسي:", "المستودع الرئيسي");
    treeData = { name: rootName, children: [], _children: null, id: "root" };

    const svg = d3.select("body").append("svg")
        .attr("width", window.innerWidth)
        .attr("height", window.innerHeight)
        .call(d3.zoom().on("zoom", (e) => g.attr("transform", e.transform)))
        .append("g");

    const g = svg.append("g").attr("transform", "translate(100,0)");
    const treeLayout = d3.tree().nodeSize([60, 220]);

    function update() {
        // نستخدم d3.hierarchy لإدارة البيانات
        const root = d3.hierarchy(treeData, d => d.children);
        treeLayout(root);

        const nodes = root.descendants();
        const links = root.links();

        // رسم الخطوط (الروابط)
        const link = g.selectAll(".link")
            .data(links, d => d.target.data.id);

        link.enter().append("path")
            .attr("class", "link")
            .merge(link)
            .transition().duration(400)
            .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));

        link.exit().remove();

        // رسم النقاط (العقد)
        const node = g.selectAll(".node")
            .data(nodes, d => d.data.id);

        const nodeEnter = node.enter().append("g")
            .attr("class", "node")
            .on("click", (event, d) => {
                if (isEditMode) {
                    selectedNode = d;
                    d3.selectAll(".node").classed("selected", false);
                    d3.select(event.currentTarget).classed("selected", true);
                } else {
                    // المنطق الذكي: إذا أغلقت العقدة، تختفي كل فروعها العميقة أيضاً
                    if (d.data.children) {
                        d.data._children = d.data.children;
                        d.data.children = null;
                    } else {
                        d.data.children = d.data._children;
                        d.data._children = null;
                    }
                    update();
                }
            });

        nodeEnter.append("circle").attr("r", 8);
        nodeEnter.append("text")
            .attr("dy", ".35em")
            .attr("x", d => d.data.children || d.data._children ? -15 : 15)
            .attr("text-anchor", d => d.data.children || d.data._children ? "end" : "start");

        const nodeUpdate = nodeEnter.merge(node);
        nodeUpdate.transition().duration(400)
            .attr("transform", d => `translate(${d.y},${d.x})`);

        // تدرج اللون الأحمر النييون حسب العمق
        nodeUpdate.select("circle")
            .style("fill", d => {
                if (d.data._children) return "#fff"; // أبيض إذا كانت مغلقة وتحتها فروع
                const intensity = Math.max(20, 255 - (d.depth * 50));
                return `rgb(${intensity}, 0, 0)`;
            })
            .style("stroke", "#ff0000");

        nodeUpdate.select("text").text(d => d.data.name);

        node.exit().remove();
    }

    // إضافة فرع واحد
    document.getElementById("add-btn").addEventListener("click", () => {
        if (!selectedNode || !isEditMode) return;
        const name = prompt("اسم الفرع:");
        if (name) {
            if (!selectedNode.data.children) selectedNode.data.children = [];
            selectedNode.data.children.push({ 
                name: name, 
                children: [], 
                _children: null, 
                id: Math.random().toString(36).substr(2, 9) 
            });
            update();
        }
    });

    // تبديل الوضع (تعديل / عرض)
    document.getElementById("save-btn").addEventListener("click", () => {
        isEditMode = !isEditMode;
        const btn = document.getElementById("save-btn");
        if (!isEditMode) {
            btn.innerHTML = "✏️";
            btn.style.background = "#444";
            // عند التحويل لوضع العرض: نغلق كل الفروع تلقائياً لتظهر الشجرة "نظيفة"
            collapseAll(treeData);
            update();
        } else {
            btn.innerHTML = "✅";
            btn.style.background = "#008000";
            // عند العودة للتعديل نفتح كل شيء ليسهل العمل
            expandAll(treeData);
            update();
        }
    });

    function collapseAll(d) {
        if (d.children && d.children.length > 0) {
            d._children = d.children;
            d._children.forEach(collapseAll);
            d.children = null;
        }
    }

    function expandAll(d) {
        if (d._children) {
            d.children = d._children;
            d._children = null;
        }
        if (d.children) d.children.forEach(expandAll);
    }

    update();
</script>
</body>
</html>
