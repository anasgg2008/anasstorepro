<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon OSINT Tree - Persistent</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { background-color: #050505; margin: 0; overflow: hidden; font-family: sans-serif; color: white; }
        .node circle { stroke: #ff0000; stroke-width: 2px; filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.8)); cursor: pointer; }
        .link { fill: none; stroke: rgba(255, 0, 0, 0.2); stroke-width: 1.5px; }
        .node text { fill: #ff9999; font-size: 13px; text-shadow: 0 0 5px rgba(255, 0, 0, 0.5); pointer-events: none; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; background: rgba(20, 0, 0, 0.9);
            padding: 10px 20px; border-radius: 50px; border: 1px solid #ff0000; z-index: 100;
        }
        button {
            background: #ff0000; border: none; color: white; width: 40px; height: 40px;
            border-radius: 50%; font-size: 18px; cursor: pointer;
        }
        .selected circle { stroke: #fff !important; stroke-width: 3px; filter: drop-shadow(0 0 12px #fff); }
        #reset-btn { background: #444; font-size: 12px; }
    </style>
</head>
<body>

<div class="controls">
    <button id="add-btn" title="إضافة">+</button>
    <button id="save-btn" title="تبديل الوضع">✅</button>
    <button id="reset-btn" title="مسح الكل">🗑️</button>
</div>

<script>
    let treeData = null;
    let selectedNode = null;
    let isEditMode = true;

    // 1. منطق استعادة البيانات أو البدء من جديد
    const savedData = localStorage.getItem('myOSINTTree');
    if (savedData) {
        treeData = JSON.parse(savedData);
    } else {
        const rootName = prompt("أدخل اسم المستودع الرئيسي لبدء شجرة جديدة:", "المستودع الرئيسي");
        treeData = { name: rootName, children: [], id: "root" };
        saveToLocalStorage();
    }

    const svg = d3.select("body").append("svg")
        .attr("width", window.innerWidth)
        .attr("height", window.innerHeight)
        .call(d3.zoom().on("zoom", (e) => g.attr("transform", e.transform)))
        .append("g");

    const g = svg.append("g").attr("transform", "translate(80,0)");
    const treeLayout = d3.tree().nodeSize([60, 200]);

    function saveToLocalStorage() {
        localStorage.setItem('myOSINTTree', JSON.stringify(treeData));
    }

    function update() {
        const root = d3.hierarchy(treeData, d => d.children);
        treeLayout(root);
        const nodes = root.descendants();
        const links = root.links();

        const link = g.selectAll(".link").data(links, d => d.target.data.id);
        link.enter().append("path").attr("class", "link").merge(link)
            .transition().duration(400).attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));
        link.exit().remove();

        const node = g.selectAll(".node").data(nodes, d => d.data.id);
        const nodeEnter = node.enter().append("g").attr("class", "node")
            .on("click", (event, d) => {
                if (isEditMode) {
                    selectedNode = d;
                    d3.selectAll(".node").classed("selected", false);
                    d3.select(event.currentTarget).classed("selected", true);
                } else {
                    if (d.data.children) {
                        d.data._children = d.data.children;
                        d.data.children = null;
                    } else {
                        d.data.children = d.data._children;
                        d.data._children = null;
                    }
                    update();
                }
            });

        nodeEnter.append("circle").attr("r", 8);
        nodeEnter.append("text").attr("dy", ".35em")
            .attr("x", d => d.data.children || d.data._children ? -15 : 15)
            .attr("text-anchor", d => d.data.children || d.data._children ? "end" : "start");

        const nodeUpdate = nodeEnter.merge(node);
        nodeUpdate.transition().duration(400).attr("transform", d => `translate(${d.y},${d.x})`);
        
        nodeUpdate.select("circle").style("fill", d => {
            if (d.data._children) return "#fff";
            const intensity = Math.max(40, 255 - (d.depth * 50));
            return `rgb(${intensity}, 0, 0)`;
        });
        nodeUpdate.select("text").text(d => d.data.name);
        node.exit().remove();
    }

    // إضافة فرع وحفظه فوراً
    document.getElementById("add-btn").addEventListener("click", () => {
        if (!selectedNode || !isEditMode) return;
        const name = prompt("اسم الفرع الجديد:");
        if (name) {
            if (!selectedNode.data.children) selectedNode.data.children = [];
            selectedNode.data.children.push({ 
                name: name, children: [], id: Math.random().toString(36).substr(2, 9) 
            });
            saveToLocalStorage(); // حفظ في ذاكرة الهاتف
            update();
        }
    });

    // تبديل الوضع
    document.getElementById("save-btn").addEventListener("click", () => {
        isEditMode = !isEditMode;
        const btn = document.getElementById("save-btn");
        if (!isEditMode) {
            btn.innerHTML = "✏️";
            collapseAll(treeData);
            update();
        } else {
            btn.innerHTML = "✅";
            expandAll(treeData);
            update();
        }
    });

    // زر الحذف النهائي للبدء من جديد
    document.getElementById("reset-btn").addEventListener("click", () => {
        if(confirm("هل أنت متأكد من مسح الشجرة بالكامل؟ لا يمكن التراجع!")) {
            localStorage.removeItem('myOSINTTree');
            location.reload();
        }
    });

    function collapseAll(d) {
        if (d.children) {
            d._children = d.children;
            d._children.forEach(collapseAll);
            d.children = null;
        }
    }
    function expandAll(d) {
        if (d._children) { d.children = d._children; d._children = null; }
        if (d.children) d.children.forEach(expandAll);
    }

    update();
</script>
</body>
</html>
