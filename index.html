<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Intelligence Tree</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { background-color: #050505; margin: 0; overflow: hidden; font-family: sans-serif; color: white; }
        
        /* تأثير النييون الأحمر */
        .node circle { 
            stroke: #ff0000; 
            stroke-width: 2px; 
            filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.9)); 
            transition: 0.3s;
        }
        
        /* النص تحت الزر وليس فوقه */
        .node text { 
            fill: #ff9999; 
            font-size: 12px; 
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.5); 
            pointer-events: none;
            user-select: none;
        }

        .link { fill: none; stroke: rgba(255, 0, 0, 0.25); stroke-width: 1.5px; }
        
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; background: rgba(15, 0, 0, 0.9);
            padding: 10px 20px; border-radius: 50px; border: 1px solid #ff0000; z-index: 100;
        }
        
        button {
            background: #ff0000; border: none; color: white; width: 42px; height: 42px;
            border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .selected circle { stroke: #fff !important; stroke-width: 3px; filter: drop-shadow(0 0 12px #fff); }
        #mode-tag { position: fixed; top: 10px; left: 10px; color: #ff0000; font-size: 10px; opacity: 0.6; }
    </style>
</head>
<body>

<div id="mode-tag">وضع الرؤية</div>

<div class="controls">
    <button id="add-btn" style="display:none;">+</button>
    <button id="mode-toggle">✏️</button>
    <button id="reset-btn">🗑️</button>
</div>

<script>
    let treeData = null;
    let selectedNode = null;
    let isEditMode = false; // يبدأ دائماً بوضع الرؤية

    // استعادة البيانات أو إنشاء جذر
    const saved = localStorage.getItem('NeonTreeStorage');
    if (saved) {
        treeData = JSON.parse(saved);
    } else {
        const rootName = prompt("اسم المستودع الرئيسي:", "الهدف");
        treeData = { name: rootName, children: [], id: "root" };
        localStorage.setItem('NeonTreeStorage', JSON.stringify(treeData));
    }

    const svg = d3.select("body").append("svg")
        .attr("width", window.innerWidth)
        .attr("height", window.innerHeight)
        .call(d3.zoom().scaleExtent([0.5, 3]).on("zoom", (e) => g.attr("transform", e.transform)))
        .append("g");

    const g = svg.append("g").attr("transform", "translate(60, " + (window.innerHeight/2) + ")");
    const treeLayout = d3.tree().nodeSize([70, 220]);

    // وظيفة إغلاق كل شيء (الطي الشامل)
    function collapseRecursive(d) {
        if (d.children) {
            d._children = d.children;
            d._children.forEach(collapseRecursive);
            d.children = null;
        }
    }

    // تهيئة الصفحة: إغلاق الشجرة عند الفتح
    collapseRecursive(treeData);

    function update() {
        const root = d3.hierarchy(treeData, d => d.children);
        treeLayout(root);
        const nodes = root.descendants();
        const links = root.links();

        const link = g.selectAll(".link").data(links, d => d.target.data.id);
        link.enter().append("path").attr("class", "link").merge(link)
            .transition().duration(400).attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));
        link.exit().remove();

        const node = g.selectAll(".node").data(nodes, d => d.data.id);
        const nodeEnter = node.enter().append("g").attr("class", "node")
            .on("click", (event, d) => {
                if (isEditMode) {
                    selectedNode = d;
                    d3.selectAll(".node").classed("selected", false);
                    d3.select(event.currentTarget).classed("selected", true);
                } else {
                    if (d.data.children) {
                        // عند التسكير: نطبق الإغلاق على هذا الفرع وكل ما تحته
                        collapseRecursive(d.data);
                    } else {
                        // عند الفتح
                        d.data.children = d.data._children;
                        d.data._children = null;
                    }
                    update();
                }
            });

        nodeEnter.append("circle").attr("r", 9);
        
        // تعديل مكان النص: تحت الدائرة بمسافة 20 بكسل
        nodeEnter.append("text")
            .attr("dy", "25px") 
            .attr("text-anchor", "middle");

        const nodeUpdate = nodeEnter.merge(node);
        nodeUpdate.transition().duration(400).attr("transform", d => `translate(${d.y},${d.x})`);
        
        nodeUpdate.select("circle")
            .style("fill", d => d.data._children ? "#000" : `rgb(${Math.max(40, 255 - d.depth*50)}, 0, 0)`);
            
        nodeUpdate.select("text").text(d => d.data.name);
        node.exit().remove();
    }

    // زر إضافة
    document.getElementById("add-btn").addEventListener("click", () => {
        if (!selectedNode) return;
        const name = prompt("اسم الفرع:");
        if (name) {
            if (!selectedNode.data.children && !selectedNode.data._children) selectedNode.data.children = [];
            let target = selectedNode.data.children || selectedNode.data._children;
            target.push({ name: name, children: [], id: "n" + Math.random().toString(36).substr(2, 5) });
            localStorage.setItem('NeonTreeStorage', JSON.stringify(treeData));
            update();
        }
    });

    // تبديل الوضع
    document.getElementById("mode-toggle").addEventListener("click", () => {
        isEditMode = !isEditMode;
        const btn = document.getElementById("mode-toggle");
        const addBtn = document.getElementById("add-btn");
        const tag = document.getElementById("mode-tag");
        
        if (isEditMode) {
            btn.innerHTML = "✅";
            addBtn.style.display = "flex";
            tag.innerHTML = "وضع التعديل";
            // فتح الشجرة بالكامل لتسهيل التعديل
            const expandAll = (d) => {
                if (d._children) { d.children = d._children; d._children = null; }
                if (d.children) d.children.forEach(expandAll);
            };
            expandAll(treeData);
        } else {
            btn.innerHTML = "✏️";
            addBtn.style.display = "none";
            tag.innerHTML = "وضع الرؤية";
            selectedNode = null;
            d3.selectAll(".node").classed("selected", false);
        }
        update();
    });

    document.getElementById("reset-btn").addEventListener("click", () => {
        if(confirm("سيتم حذف كل شيء! هل أنت متأكد؟")) {
            localStorage.removeItem('NeonTreeStorage');
            location.reload();
        }
    });

    update();
</script>
</body>
</html>
