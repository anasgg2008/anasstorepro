<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Intelligence OSINT Tree</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { background-color: #050505; margin: 0; overflow: hidden; font-family: sans-serif; color: white; }
        .node circle { stroke: #ff0000; stroke-width: 2px; filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.9)); cursor: pointer; }
        .link { fill: none; stroke: rgba(255, 0, 0, 0.25); stroke-width: 1.5px; }
        .node text { fill: #ff9999; font-size: 11px; text-shadow: 0 0 5px rgba(255, 0, 0, 0.5); pointer-events: all; cursor: pointer; user-select: none; }
        
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; background: rgba(15, 0, 0, 0.95);
            padding: 10px 15px; border-radius: 50px; border: 1px solid #ff0000; z-index: 100;
        }
        
        button {
            background: #ff0000; border: none; color: white; width: 38px; height: 38px;
            border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .selected circle { stroke: #fff !important; stroke-width: 3px; filter: drop-shadow(0 0 12px #fff); }
        #mode-tag { position: fixed; top: 10px; left: 10px; color: #ff0000; font-size: 10px; opacity: 0.6; }
        
        /* ستايل للرابط التفاعلي */
        .node-link { fill: #00ccff !important; text-decoration: underline; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="mode-tag">وضع الرؤية</div>

<div class="controls">
    <button id="add-btn" style="display:none;" title="إضافة">+</button>
    <button id="edit-text-btn" style="display:none;" title="تعديل الاسم">📝</button>
    <button id="del-btn" style="display:none;" title="حذف الفرع">🗑️</button>
    <button id="mode-toggle">✏️</button>
</div>

<script>
    let treeData = null;
    let selectedNode = null;
    let isEditMode = false;

    // استعادة البيانات
    const saved = localStorage.getItem('NeonTreeStorageV2');
    if (saved) {
        treeData = JSON.parse(saved);
    } else {
        const rootName = prompt("اسم المستودع الرئيسي:", "المركز");
        treeData = { name: rootName, children: [], id: "root" };
        save();
    }

    function save() { localStorage.setItem('NeonTreeStorageV2', JSON.stringify(treeData)); }

    const svg = d3.select("body").append("svg")
        .attr("width", window.innerWidth)
        .attr("height", window.innerHeight)
        .call(d3.zoom().scaleExtent([0.1, 3]).on("zoom", (e) => g.attr("transform", e.transform)))
        .append("g");

    const g = svg.append("g").attr("transform", `translate(100, ${window.innerHeight/2})`);
    const treeLayout = d3.tree().nodeSize([80, 250]);

    function collapseRecursive(d) {
        if (d.children) {
            d._children = d.children;
            d._children.forEach(collapseRecursive);
            d.children = null;
        }
    }

    if (!isEditMode) collapseRecursive(treeData);

    function wrapText(text, width) {
        text.each(function() {
            var text = d3.select(this),
                words = text.text().split(/\s+/).reverse(),
                word,
                line = [],
                lineNumber = 0,
                lineHeight = 1.1, // ems
                y = text.attr("y"),
                dy = parseFloat(text.attr("dy")),
                tspan = text.text(null).append("tspan").attr("x", 0).attr("y", y).attr("dy", dy + "em");
            
            while (word = words.pop()) {
                line.push(word);
                tspan.text(line.join(" "));
                if (tspan.node().getComputedTextLength() > width) {
                    line.pop();
                    tspan.text(line.join(" "));
                    line = [word];
                    tspan = text.append("tspan").attr("x", 0).attr("y", y).attr("dy", ++lineNumber * lineHeight + dy + "em").text(word);
                }
            }
        });
    }

    function update() {
        const root = d3.hierarchy(treeData, d => d.children);
        treeLayout(root);
        const nodes = root.descendants();
        const links = root.links();

        const link = g.selectAll(".link").data(links, d => d.target.data.id);
        link.enter().append("path").attr("class", "link").merge(link)
            .transition().duration(400).attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));
        link.exit().remove();

        const node = g.selectAll(".node").data(nodes, d => d.data.id);
        const nodeEnter = node.enter().append("g").attr("class", "node")
            .on("click", (event, d) => {
                if (isEditMode) {
                    selectedNode = d;
                    d3.selectAll(".node").classed("selected", false);
                    d3.select(event.currentTarget).classed("selected", true);
                } else {
                    if (d.data.name.startsWith('http')) {
                        window.open(d.data.name, '_blank');
                    } else {
                        if (d.data.children) collapseRecursive(d.data);
                        else { d.data.children = d.data._children; d.data._children = null; }
                        update();
                    }
                }
            });

        nodeEnter.append("circle").attr("r", 10);
        nodeEnter.append("text").attr("dy", "1.5em").attr("text-anchor", "middle");

        const nodeUpdate = nodeEnter.merge(node);
        nodeUpdate.transition().duration(400).attr("transform", d => `translate(${d.y},${d.x})`);
        
        nodeUpdate.select("circle")
            .style("fill", d => d.data._children ? "#000" : `rgb(${Math.max(40, 255 - d.depth*50)}, 0, 0)`);
            
        nodeUpdate.select("text")
            .classed("node-link", d => d.data.name.startsWith('http'))
            .text(d => {
                if (d.data.name.startsWith('http')) return "🔗 " + d.data.name.substring(0, 15) + "...";
                return d.data.name;
            })
            .call(wrapText, 120); // تقطيع النص إذا زاد عن 120 بكسل

        node.exit().remove();
    }

    // إضافة فرع
    document.getElementById("add-btn").addEventListener("click", () => {
        if (!selectedNode) return;
        const name = prompt("اسم الفرع أو الرابط:");
        if (name) {
            if (!selectedNode.data.children && !selectedNode.data._children) selectedNode.data.children = [];
            let target = selectedNode.data.children || selectedNode.data._children;
            target.push({ name: name, children: [], id: "n" + Math.random().toString(36).substr(2, 5) });
            save(); update();
        }
    });

    // حذف الفرع المحدد
    document.getElementById("del-btn").addEventListener("click", () => {
        if (!selectedNode || selectedNode.depth === 0) return;
        if (confirm("حذف هذا الفرع وكل ما تحته؟")) {
            const parent = selectedNode.parent.data;
            parent.children = (parent.children || parent._children).filter(c => c.id !== selectedNode.data.id);
            if(parent._children) parent._children = parent.children;
            selectedNode = null;
            save(); update();
        }
    });

    // تعديل النص
    document.getElementById("edit-text-btn").addEventListener("click", () => {
        if (!selectedNode) return;
        const newName = prompt("تعديل الاسم:", selectedNode.data.name);
        if (newName) {
            selectedNode.data.name = newName;
            save(); update();
        }
    });

    // تبديل الوضع
    document.getElementById("mode-toggle").addEventListener("click", () => {
        isEditMode = !isEditMode;
        const btn = document.getElementById("mode-toggle");
        const ctrls = ["add-btn", "del-btn", "edit-text-btn"];
        
        if (isEditMode) {
            btn.innerHTML = "✅";
            ctrls.forEach(id => document.getElementById(id).style.display = "flex");
            document.getElementById("mode-tag").innerHTML = "وضع التعديل";
        } else {
            btn.innerHTML = "✏️";
            ctrls.forEach(id => document.getElementById(id).style.display = "none");
            document.getElementById("mode-tag").innerHTML = "وضع الرؤية";
            selectedNode = null;
            d3.selectAll(".node").classed("selected", false);
        }
        update();
    });

    update();
</script>
</body>
</html>
